<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>兒童成長監測系統 - 百分位專業版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #3498db; margin-bottom: 20px; padding-bottom: 15px; }
        .config-section { background: #e8f4fd; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .table-container { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #3498db; color: white; padding: 12px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }
        input { width: 80%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        .btn-chart { background: #3498db; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .chart-wrapper { margin-top: 30px; background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #edf2f7; }
        canvas { height: 450px !important; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2>📊 兒童身高百分位監測系統</h2></div>

    <div class="config-section">
        <div><label><strong>1. 性別：</strong></label><select id="pGender"><option value="male">男童</option></select></div>
        <div><label><strong>2. 出生日期：</strong></label><input type="date" id="pBirth"></div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>年齡階段</th><th>身高 (cm)</th><th>體重 (kg)</th></tr></thead>
            <tbody id="input-body">
                <tr class="data-row" data-age="0"><td>出生</td><td><input type="number" step="0.1" class="h-input" placeholder="cm"></td><td><input type="number" step="0.1" class="w-input" placeholder="kg"></td></tr>
                <tr class="data-row" data-age="0.5"><td>6個月</td><td><input type="number" step="0.1" class="h-input"></td><td><input type="number" step="0.1" class="w-input"></td></tr>
                <tr class="data-row" data-age="1"><td>1歲</td><td><input type="number" step="0.1" class="h-input"></td><td><input type="number" step="0.1" class="w-input"></td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn-chart" onclick="generateAnalysis()">產出百分位對比圖表</button>

    <div id="charts-area" style="display:none;">
        <div class="chart-wrapper"><h4>📏 實際身高 vs. 國健署百分位參考線</h4><canvas id="percentileChart"></canvas></div>
    </div>
</div>

<script>
    // 根據老師提供之圖片數據設定
    const refData = {
        male: {
            ages: ["出生", "6個月", "1歲"],
            p3: [46.3, 63.3, 71.0], // 出生 46.3
            p50: [49.9, 67.6, 75.7], // 出生 49.9
            p97: [53.4, 71.9, 80.5]  // 出生 53.4
        }
    };

    let pChart;

    function generateAnalysis() {
        const labels = refData.male.ages;
        const actualH = [];
        document.querySelectorAll('.data-row').forEach(row => {
            const h = parseFloat(row.querySelector('.h-input').value);
            actualH.push(h || null);
        });

        document.getElementById('charts-area').style.display = 'block';
        if (pChart) pChart.destroy();

        const ctx = document.getElementById('percentileChart').getContext('2d');
        pChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '實際測量身高', data: actualH, borderColor: '#2980b9', borderWidth: 4, pointRadius: 6, pointBackgroundColor: '#2980b9', z: 10, fill: false },
                    { label: '97th 百分位', data: refData.male.p97, borderColor: '#e74c3c', borderDash: [5, 5], fill: false, pointRadius: 0 },
                    { label: '50th 百分位 (平均)', data: refData.male.p50, borderColor: '#27ae60', fill: false, pointRadius: 0 },
                    { label: '3rd 百分位', data: refData.male.p3, borderColor: '#e74c3c', borderDash: [5, 5], fill: false, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { title: { display: true, text: '身高 (cm)' } } },
                plugins: { tooltip: { mode: 'index', intersect: false } }
            }
        });
    }
</script>
</body>
</html>
