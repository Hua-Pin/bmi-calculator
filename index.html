<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童成長監測系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #3498db; margin-bottom: 20px; padding-bottom: 15px; }
        .instruction { background: #f0fdf4; border-left: 5px solid #22c55e; padding: 15px; margin-bottom: 20px; font-size: 14px; color: #166534; line-height: 1.6; }
        .config-section { background: #e8f4fd; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .diagnosis-box { background: #fffbe6; border: 2px solid #ffe58f; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .table-container { max-height: 450px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #3498db; color: white; padding: 12px; z-index: 10; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #f1f1f1; }
        .section-header { background-color: #ebf5fb; font-weight: bold; color: #2980b9; text-align: left; padding-left: 15px !important; }
        .vaccine-note { font-size: 11px; color: #e67e22; display: block; }
        .highlight { background-color: #fff9c4 !important; font-weight: bold; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; text-align: center; width: 90%; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; transition: 0.3s; }
        .btn-chart { background: #3498db; }
        .btn-export { background: #27ae60; }
        .chart-wrapper { margin-top: 30px; height: 450px; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #edf2f7; }
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .author-info { font-size: 16px; color: #2980b9; font-weight: bold; margin-bottom: 5px; }
        .ref-note { font-size: 12px; color: #95a5a6; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2>📊 兒童成長監測系統</h2></div>

    <div class="instruction">
        <strong>📝 填寫小叮嚀：</strong><br>
        您可以翻閱<strong>《兒童健康手冊》</strong>，在「預防接踵紀錄」與「家長紀錄事項」中找到孩子出生、2個月、4個月及6個月大時的身高體重。
    </div>

    <div class="config-section">
        <div>
            <label><strong>1. 孩子性別：</strong></label>
            <select id="pGender">
                <option value="male">男童 (Boy)</option>
                <option value="female">女童 (Girl)</option>
            </select>
        </div>
        <div>
            <label><strong>2. 出生年月日：</strong></label>
            <input type="date" id="pBirth" onchange="calculateAge()">
        </div>
    </div>

    <div id="age-display" style="text-align: center; margin-bottom: 15px; color: #2c3e50; font-weight: bold;"></div>
    <div id="diagnosis" class="diagnosis-box"></div>
    
    <div class="table-container">
        <table>
            <thead><tr><th>階段</th><th>身高 (cm)</th><th>體重 (kg)</th></tr></thead>
            <tbody id="input-body">
                <tr class="section-header"><td colspan="3">💉 嬰兒期 (疫苗接種關鍵期)</td></tr>
                <tr id="row-0"><td>出生</td><td><input type="number" step="0.1" class="h-input"></td><td><input type="number" step="0.1" class="w-input"></td></tr>
                <tr id="row-m2"><td>2個月<span class="vaccine-note">五合一/肺炎鏈球菌(1)</span></td><td><input type="number" step="0.1" class="h-input"></td><td><input type="number" step="0.1" class="w-input"></td></tr>
                <tr id="row-m4"><td>4個月<span class="vaccine-note">五合一/肺炎鏈球菌(2)</span></td><td><input type="number" step="0.1" class="h-input"></td><td><input type="number" step="0.1" class="w-input"></td></tr>
                <tr id="row-m6"><td>6個月<span class="vaccine-note">五合一/B肝(3)</span></td><td><input type="number" step="0.1" class="h-input"></td><td><input type="number" step="0.1" class="w-input"></td></tr>
                <tr class="section-header"><td colspan="3">🏠 幼兒至青少年期 (年度檢查)</td></tr>
            </tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn-chart" onclick="generateAnalysis()">1. 產出成長趨勢報告</button>
        <button class="btn-export" onclick="exportData()">2. 匯出紀錄 (CSV)</button>
    </div>

    <div id="charts-area" style="display:none;">
        <div class="chart-wrapper"><h4>📏 身高百分位區間 (0-18歲)</h4><canvas id="heightChart"></canvas></div>
        <div class="chart-wrapper"><h4>📈 BMI 成長趨勢</h4><canvas id="bmiChart"></canvas></div>
    </div>

    <div class="footer">
        <div class="author-info">設計者：亞洲大學 護理學系 張華蘋老師</div>
        <div class="ref-note">
            參考依據：衛福部國健署兒童生長曲線與 BMI 建議值<br>
            © 2026 亞洲大學護理學系 與 中山醫學大學遺傳代謝科 數位健康照護研究團隊
        </div>
    </div>
</div>

<script>
    const bmiNorms = {
        male: { over: [14.8, 18.3, 17.4, 17.0, 16.7, 16.7, 16.9, 17.9, 19.0, 19.5, 20.0, 20.7, 21.3, 21.9, 22.5, 22.9, 23.3, 23.5], obese: [15.8, 19.2, 18.3, 17.8, 17.6, 17.7, 18.5, 20.3, 21.6, 22.3, 22.7, 23.2, 23.9, 24.5, 25.0, 25.4, 25.6, 25.6] },
        female: { over: [14.7, 17.9, 17.2, 16.9, 16.8, 17.0, 17.2, 17.7, 18.4, 19.1, 19.7, 20.5, 21.3, 21.9, 22.5, 22.7, 22.7, 22.7], obese: [15.5, 19.0, 18.1, 17.8, 17.9, 18.1, 18.8, 19.6, 20.7, 21.3, 22.0, 22.7, 23.5, 24.3, 24.9, 25.2, 25.3, 25.3] }
    };

    const heightPercentiles = {
        male: { p3: [50, 75, 85, 93, 99, 105, 110, 115, 120, 125, 130, 135, 142, 150, 158, 163, 165, 166, 167], p97: [54, 82, 92, 102, 110, 118, 125, 132, 138, 144, 150, 158, 168, 176, 182, 185, 186, 187, 188] },
        female: { p3: [49, 73, 84, 92, 98, 104, 109, 114, 119, 124, 130, 136, 143, 148, 151, 152, 153, 153, 154], p97: [53, 80, 91, 101, 109, 116, 123, 130, 137, 144, 152, 159, 165, 168, 170, 171, 171, 172, 172] }
    };

    const annualAges = ['1歲', '2歲', '3歲', '4歲', '5歲', '6歲', '7歲', '8歲', '9歲', '10歲', '11歲', '12歲', '13歲', '14歲', '15歲', '16歲', '17歲', '18歲'];
    const tbody = document.getElementById('input-body');
    annualAges.forEach((age, i) => {
        tbody.innerHTML += `<tr id="row-${i+1}"><td>${age}</td><td><input type="number" step="0.1" class="h-input"></td><td><input type="number" step="0.1" class="w-input"></td></tr>`;
    });

    function calculateAge() {
        const birth = new Date(document.getElementById('pBirth').value);
        const now = new Date();
        if (isNaN(birth)) return;
        let years = now.getFullYear() - birth.getFullYear();
        let months = now.getMonth() - birth.getMonth();
        if (months < 0) { years--; months += 12; }
        document.getElementById('age-display').innerHTML = `👶 孩子目前約：${years} 歲 ${months} 個月`;
        document.querySelectorAll('tr').forEach(tr => tr.classList.remove('highlight'));
        if (years === 0) {
            if (months >= 6) document.getElementById('row-m6').classList.add('highlight');
            else if (months >= 4) document.getElementById('row-m4').classList.add('highlight');
            else if (months >= 2) document.getElementById('row-m2').classList.add('highlight');
            else document.getElementById('row-0').classList.add('highlight');
        } else {
            const rowIdx = Math.min(years, 18);
            document.getElementById(`row-${rowIdx}`).classList.add('highlight');
        }
    }

    function generateAnalysis() {
        document.getElementById('charts-area').style.display = 'block';
        const gender = document.getElementById('pGender').value;
        const hData = [], bmiData = [];
        let latestBmi = null, latestLabel = "";

        // 處理數據 (排除 section-header)
        const rows = document.querySelectorAll('#input-body tr:not(.section-header)');
        const chartLabels = ['出生', '2月', '4月', '6月', '1歲', '2歲', '3歲', '4歲', '5歲', '6歲', '7歲', '8歲', '9歲', '10歲', '11歲', '12歲', '13歲', '14歲', '15歲', '16歲', '17歲', '18歲'];
        
        rows.forEach((row, i) => {
            const h = parseFloat(row.querySelector('.h-input').value);
            const w = parseFloat(row.querySelector('.w-input').value);
            hData.push(h || null);
            if (h > 0 && w > 0) {
                const bmi = (w / Math.pow(h / 100, 2)).toFixed(1);
                bmiData.push(bmi);
                latestBmi = bmi;
                latestLabel = chartLabels[i];
            } else { bmiData.push(null); }
        });

        // 簡化診斷 (只針對 1 歲以後進行體位判定，因 0-1 歲變動極大)
        const diag = document.getElementById('diagnosis');
        if (latestBmi) {
            diag.style.display = 'block';
            diag.innerHTML = `<strong>📍 最新監測報告 (${latestLabel})：</strong><br>BMI：${latestBmi}。`;
            // 若大於等於 1 歲才進行過重判定
            if (!latestLabel.includes('月') && latestLabel !== '出生') {
                const ageIdx = annualAges.indexOf(latestLabel);
                const norms = bmiNorms[gender];
                let status = "🟢 目前體位正常";
                if (latestBmi >= norms.obese[ageIdx]) status = "🔴 判定為：肥胖";
                else if (latestBmi >= norms.over[ageIdx]) status = "🟡 判定為：過重";
                diag.innerHTML += status;
            }
        }

        const ctxH = document.getElementById('heightChart').getContext('2d');
        if (hChart) hChart.destroy();
        hChart = new Chart(ctxH, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{ label: '孩子身高', data: hData, borderColor: '#000', borderWidth: 4 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctxB = document.getElementById('bmiChart').getContext('2d');
        if (bChart) bChart.destroy();
        bChart = new Chart(ctxB, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{ label: 'BMI 成長軌跡', data: bmiData, borderColor: '#2c3e50', borderWidth: 3, fill: false, tension: 0.3 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
        window.scrollTo({ top: diag.offsetTop, behavior: 'smooth' });
    }

    function exportData() {
        const gender = document.getElementById('pGender').value === 'male' ? '男' : '女';
        const birth = document.getElementById('pBirth').value;
        let csv = "\ufeff設計者,亞洲大學護理學系 張華蘋老師\n合作單位,中山醫學大學遺傳代謝科\n生日," + birth + "\n性別," + gender + "\n階段,身高,體重,BMI\n";
        document.querySelectorAll('#input-body tr:not(.section-header)').forEach(row => {
            const age = row.cells[0].innerText.split('\n')[0];
            const h = row.querySelector('.h-input').value;
            const w = row.querySelector('.w-input').value;
            let bmi = (h > 0 && w > 0) ? (w / Math.pow(h / 100, 2)).toFixed(1) : "";
            csv += `${age},${h},${w},${bmi}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `成長分析研究報告.csv`;
        link.click();
    }
</script>
</body>
</html>
