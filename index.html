<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童成長數據監測系統 - 亞大護理系張華蘋老師</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f8fafc; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #3498db; margin-bottom: 20px; padding-bottom: 15px; }
        .author-info { font-size: 15px; color: #2980b9; margin-top: 8px; font-weight: bold; }
        .config-section { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .table-container { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #3498db; color: white; padding: 12px; z-index: 10; font-size: 14px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #f1f1f1; }
        input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; transition: 0.3s; }
        .btn-chart { background: #3498db; }
        .btn-export { background: #27ae60; }
        .chart-wrapper { margin-top: 30px; height: 350px; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #edf2f7; }
        .velocity-tag { font-size: 11px; color: #7f8c8d; display: block; margin-top: 2px; height: 14px; }
        h4 { margin: 10px 0; color: #2d3748; border-left: 4px solid #3498db; padding-left: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>📊 兒童成長數據監測系統</h2>
        <div class="author-info">設計者：亞洲大學 護理學系 張華蘋老師</div>
    </div>

    <div class="config-section">
        <label><strong>孩子性別：</strong></label>
        <select id="pGender">
            <option value="male">男童 (Boy)</option>
            <option value="female">女童 (Girl)</option>
        </select>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>年齡階段</th>
                    <th>身高 (cm)</th>
                    <th>體重 (kg)</th>
                </tr>
            </thead>
            <tbody id="input-body"></tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn-chart" onclick="generateAllCharts()">1. 產出成長趨勢圖</button>
        <button class="btn-export" onclick="exportData()">2. 匯出生長資料 (CSV)</button>
    </div>

    <div id="charts-area" style="display:none;">
        <div class="chart-wrapper"><h4>📏 身高成長趨勢 (Height)</h4><canvas id="heightChart"></canvas></div>
        <div class="chart-wrapper"><h4>⚖️ 體重成長趨勢 (Weight)</h4><canvas id="weightChart"></canvas></div>
        <div class="chart-wrapper"><h4>📈 BMI 變化趨勢</h4><canvas id="bmiChart"></canvas></div>
    </div>
</div>

<script>
    const ages = ['出生', '1歲', '2歲', '3歲', '4歲', '5歲', '6歲', '7歲', '8歲', '9歲', '10歲', '11歲', '12歲', '13歲', '14歲', '15歲', '16歲', '17歲', '18歲'];
    const tbody = document.getElementById('input-body');

    ages.forEach((age, i) => {
        tbody.innerHTML += `
            <tr>
                <td><strong>${age}</strong></td>
                <td>
                    <input type="number" step="0.1" class="h-input" onchange="calcVel(${i})">
                    <span id="h-vel-${i}" class="velocity-tag"></span>
                </td>
                <td>
                    <input type="number" step="0.1" class="w-input" onchange="calcVel(${i})">
                    <span id="w-vel-${i}" class="velocity-tag"></span>
                </td>
            </tr>`;
    });

    function calcVel(i) {
        if (i === 0) return;
        const h = parseFloat(document.querySelectorAll('.h-input')[i].value);
        const hP = parseFloat(document.querySelectorAll('.h-input')[i-1].value);
        const w = parseFloat(document.querySelectorAll('.w-input')[i].value);
        const wP = parseFloat(document.querySelectorAll('.w-input')[i-1].value);
        if (h && hP) document.getElementById(`h-vel-${i}`).innerText = `↑${(h - hP).toFixed(1)} cm`;
        if (w && wP) document.getElementById(`w-vel-${i}`).innerText = `↑${(w - wP).toFixed(1)} kg`;
    }

    let charts = {};
    function createChart(id, label, data, color) {
        const ctx = document.getElementById(id).getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ages,
                datasets: [{ label, data, borderColor: color, borderWidth: 3, pointRadius: 4, spanGaps: true, tension: 0.3 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function generateAllCharts() {
        document.getElementById('charts-area').style.display = 'block';
        const hData = [], wData = [], bmiData = [];
        const rows = document.querySelectorAll('#input-body tr');

        rows.forEach(row => {
            const h = parseFloat(row.querySelector('.h-input').value);
            const w = parseFloat(row.querySelector('.w-input').value);
            hData.push(h || null);
            wData.push(w || null);
            bmiData.push((h > 0 && w > 0) ? (w / Math.pow(h / 100, 2)).toFixed(1) : null);
        });

        createChart('heightChart', '身高 (cm)', hData, '#3498db');
        createChart('weightChart', '體重 (kg)', wData, '#e67e22');
        createChart('bmiChart', 'BMI 數值', bmiData, '#2ecc71');
        
        window.scrollTo({ top: document.getElementById('charts-area').offsetTop, behavior: 'smooth' });
    }

    function exportData() {
        const gender = document.getElementById('pGender').value === 'male' ? '男' : '女';
        let csv = "\ufeff設計者,亞洲大學護理學系 張華蘋老師\n性別," + gender + "\n年齡,身高(cm),體重(kg),BMI\n";
        document.querySelectorAll('#input-body tr').forEach(row => {
            const age = row.cells[0].innerText;
            const h = row.querySelector('.h-input').value;
            const w = row.querySelector('.w-input').value;
            let bmi = (h > 0 && w > 0) ? (w / Math.pow(h / 100, 2)).toFixed(1) : "";
            csv += `${age},${h},${w},${bmi}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `兒童成長分析紀錄_張華蘋老師團隊.csv`;
        link.click();
    }
</script>
</body>
</html>
